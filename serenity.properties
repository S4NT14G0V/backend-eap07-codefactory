# =============================================================================
# Serenity BDD Configuration — Motor de Pagos Embebidos (AppStripe)
# =============================================================================
# Reportes living documentation
serenity.report.show.legacy=false
serenity.report.single-page-html=true
serenity.report.single-page-html.directory=target/site/serenity

# Nombres significativos en reportes
serenity.test.root=com.codefactory.appstripe.serenity

# Configuración REST
serenity.rest.default.baseUri=http://localhost

# Logging
serenity.logging=quiet

# Fuentes de requirements (feature files)
serenity.features.src=src/test/resources/features

# Encoding para feature files en español
serenity.character.encoding=UTF-8
