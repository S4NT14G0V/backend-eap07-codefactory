spring.application.name=appstripe
# ===============================
# Configuración de Conexión a BD MySQL
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3406/appstripe_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=codefactory
spring.datasource.password=apppassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuración de JPA / Auto-DDL
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# Configuración JWT
# ===============================
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration-ms=86400000
jwt.issuer=paycore-auth