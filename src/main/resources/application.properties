spring.application.name=appstripe
# ===============================
# Configuración de Conexión a BD MySQL
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3406/appstripe_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=codefactory
spring.datasource.password=apppassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuración de JPA / Auto-DDL
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true